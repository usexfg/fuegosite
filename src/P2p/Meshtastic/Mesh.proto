syntax = "proto3";

package meshtastic;

enum Priority {
  BACKGROUND = 0;
  LOW = 1;
  MEDIUM = 2;
  HIGH = 3;
  IMMEDIATE = 4;
}

enum PortNum {
  TEXT_MESSAGE_APP = 1;
  POSITION_APP = 2;
  NEIGHBORINFO_APP = 3;
  ROUTING_APP = 4;
  ADMIN_APP = 5;
  METRIC_APP = 6;
  DETECTING_APP = 7;
  IPA_APP = 8;
  RANGE_TEST_APP = 9;
  SERIAL_APP = 10;
  ZPS_APP = 11;
  AUDIO_APP = 12;
  REMOTE_HARDWARE_APP = 13;
  TRACEROUTE_APP = 14;
  SIMULATOR_APP = 15;
  STORE_FORWARD_APP = 16;
  RELAY_APP = 17;
  MQTT_APP = 18;
  MACOS_ALERT_APP = 19;
  TELEMETRY_APP = 20;
  PAXCOUNTER_APP = 21;
  ATAK_FORWARDER_APP = 22;
  OPA_APP = 23;
  EXTERNAL_NOTICE_APP = 24;
  CANNED_MSG_APP = 25;
  DEVICE_METRICS_APP = 26;
  NODE_INFO_APP = 27;
  ROUTER_METRICS_APP = 28;
  RADIO_REQUEST_APP = 29;
  RADIO_RESPONSE_APP = 30;
  PRIVATE_APP = 31;
  WAYPOINT_APP = 32;
  RANGING_APP = 33;
  POWERSTRESS_APP = 34;
  AUDIO_BOOKMARK_APP = 35;
  NEIGHBOR_INFO_APP = 36;
  NEIGHBOR_PACKET_APP = 37;
  USER_APP = 65535; // Custom app port for Fuego
}

message Data {
  PortNum portnum = 1;
  bytes payload = 2;
  uint32 request_id = 3; // Used for response correlation
  string want_response = 4; // Node ID of node that should respond
}

message Position {
  float latitude_i = 1; // Degrees * 1e7 (38177345 = 38.177345)
  float longitude_i = 2; // Degrees * 1e7
  int32 altitude = 3; // Meters WGS84 (from GPS)
  int32 altitude_geoidal_separation = 4; // Meters (from GPS)
  float speed = 5; // Ground speed in knots * 100
  float ground_track = 6; // Degrees * 100 (course over ground)
  float PDOP = 7; // Position dilution of precision * 100
  float sats_in_view = 8; // Number of satellites in view
  uint32 timestamp = 9; // Unix epoch timestamp in seconds
}

message NodeInfo {
  uint32 num = 1; // Unique node number (32 bits)
  string user = 2; // User information (JSON string)
  uint32 last_heard = 3; // Unix timestamp when last heard
  Position position = 4; // Last known position
}

message AdminMessage {
  enum AdminMessageType {
    UNKNOWN = 0;
    RADIO_CONFIG = 1;
    MODULE_CONFIG = 2;
    DEVICE_METRICS = 3;
    NODE_INFO = 4;
    CHANNELS = 5;
  }

  AdminMessageType type = 1;
  bytes payload = 2;
}

message RouteDiscovery {
  uint32 destination = 1;
  uint32 source = 2;
  uint32 id = 3;
  uint32 route = 4; // Bitmask of visited nodes
}

message MeshPacket {
  uint32 id = 1; // Unique packet ID
  uint32 from = 2; // Sender's node number
  uint32 to = 3; // Recipient's node number (BROADCAST_NUM = 0xffffffff for broadcast)
  uint32 channel = 4; // Channel index
  Priority priority = 5; // Packet priority
  bool want_ack = 6; // Request acknowledgment
  uint32 hop_limit = 7; // Time-to-live (TTL)
  uint32 hop_start = 8; // Initial hop limit
  uint32 rx_time = 9; // Timestamp when received
  uint32 rx_snr = 10; // SNR when received
  uint32 rx_rssi = 11; // RSSI when received
  uint32 hop_count = 12; // Number of hops taken
  bool decoded = 13; // Whether the packet has been decoded

  oneof payload_variant {
    Data data = 20;
    Position position = 21;
    AdminMessage admin = 22;
    NodeInfo node_info = 23;
    RouteDiscovery route = 24;
  }

  // Special constants
  uint32 BROADCAST_NUM = 0xffffffff; // Broadcast address
}

message RadioConfig {
  enum ModemPreset {
    NOT_SET = 0;
    BANDWIDTH_31_25_CR_8_5_SF_12 = 1;
    BANDWIDTH_500_CR_4_5_SF_7 = 2;
    BANDWIDTH_31_25_CR_8_5_SF_9 = 3;
    BANDWIDTH_125_CR_4_8_SF_12 = 4;
    BANDWIDTH_500_CR_4_5_SF_9 = 5;
  }

  message HardwareConfig {
    string chip = 1;
    string version = 2;
  }

  message RegionCode {
    enum Value {
      NOT_SET = 0;
      US = 1;
      EU_433 = 2;
      EU_868 = 3;
      CN_470 = 4;
      CN_779 = 5;
      AU_915 = 6;
      US_915 = 7;
      EU_433 = 8;
    }
  }

  message BluetoothConfig {
    string password = 1;
    bool enabled = 2;
  }

  ModemPreset modem_preset = 1;
  HardwareConfig hardware = 2;
  RegionCode region = 3;
  BluetoothConfig bluetooth = 4;
}

message ModuleConfig {
  enum ModuleType {
    NOT_SET = 0;
    MQTT = 1;
    SERIAL = 2;
    STORE_FORWARD = 3;
    RANGING = 4;
    NEIGHBOR_INFO = 5;
  }

  oneof module {
    MqttConfig mqtt = 1;
    SerialConfig serial = 2;
    StoreForwardConfig store_forward = 3;
    RangingConfig ranging = 4;
    NeighborInfoConfig neighbor_info = 5;
  }
}

message MqttConfig {
  string address = 1;
  string username = 2;
  string password = 3;
  string root = 4;
  bool enabled = 5;
}

message SerialConfig {
  bool enabled = 1;
}

message StoreForwardConfig {
  bool enabled = 1;
  uint32 num_messages = 2;
  uint32 timeout_mins = 3;
}

message RangingConfig {
  bool enabled = 1;
}

message NeighborInfoConfig {
  bool enabled = 1;
  uint32 update_interval = 2;
}
