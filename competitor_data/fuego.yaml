name: Fuego
symbol: XFG
website: https://usexfg.org
tagline: "Open-source peer-to-peer decentralized private cryptocurrency"
founded: 2014
headquarters: Decentralized

# Positioning
primary_use_case: "Private transactions, commitment deposits, atomic swaps"
target_audience: "Privacy-conscious users, DeFi traders, yield seekers"
market_position: "Privacy-first DeFi with unique CD yield model"

# Tokenomics
token_name: XFG (main), HEAT (burn-to-mint reward)
max_supply: 18.4 million XFG
emission_smooth: true
block_time: 60 seconds
privacy_tech: CryptoNote (ring signatures, stealth addresses, confidential transactions)

# Features
features:
  privacy: 9
  atomic_swaps: 9
  commitment_deposits: 10
  transferable_cds: 8
  heat_token: 7
  tui_interface: 8
  dex_integration: 6
  governance: 5

# Strengths (be honest)
strengths:
  - Strong privacy guarantees via CryptoNote
  - Innovative Commitment Deposit (CD) system with yield from swap fees
  - Transferable CDs enable secondary market without unlocking
  - HEAT token provides burn-to-mint mechanism for long-term holders
  - Atomic swap capability for cross-chain trading
  - Active development and community
  - No premine, fair launch
  - Multiple explorer options for transparency

# Weaknesses (be fair)
weaknesses:
  - Lower liquidity compared to major privacy coins
  - Smaller ecosystem and fewer integrations
  - Complex CD mechanics may be confusing for newcomers
  - Limited mobile wallet options
  - Lower trading volume on exchanges
  - Technical complexity of swap/CD system
  - Limited DeFi composability compared to Ethereum-based projects

# Best for
best_for:
  - Users prioritizing transaction privacy
  - Yield seekers interested in swap-fee generated CD interest
  - Traders wanting private atomic swaps
  - Long-term holders who can benefit from HEAT rewards
  - Users comfortable with more complex DeFi primitives
  - Communities valuing decentralization and open-source ethos

# Not ideal for
not_ideal_for:
  - Users seeking simple, familiar banking-like experiences
  - Those needing high-frequency trading capabilities
  - Users requiring extensive DeFi composability (like Ethereum L2s)
  - Beginners unfamiliar with cryptocurrency concepts
  - Institutional users needing regulatory clarity (though privacy helps)

# Common complaints (from community)
common_complaints:
  - "Wish there were more exchanges listing XFG"
  - "CD system is powerful but has learning curve"
  - "Mobile experience could be better"
  - "Want more DeFi integrations and yield strategies"
  - "Atomic swap liquidity sometimes limited"

# Migration notes
migration_from:
  difficulty: medium
  data_export: "Standard seed phrase export"
  what_transfers: "Wallet balance, transaction history"
  what_doesnt: "Ongoing swap positions (need to close manually)"
  time_estimate: "15 minutes for standard wallet migration"